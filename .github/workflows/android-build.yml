name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Web Project
        run: pnpm build

      - name: Ensure Web Directory Exists
        run: |
          mkdir -p public
          if [ ! -f public/index.html ]; then
            echo "<html><body><h1>Placeholder</h1></body></html>" > public/index.html
          fi

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Install Legacy Build Tools (29.0.3)
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;29.0.3"

      - name: Detect Keystore Alias
        id: detect_alias
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > debug.keystore
          # Get the first alias that is a PrivateKeyEntry
          ALIAS=$(keytool -list -keystore debug.keystore -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" | grep PrivateKeyEntry | cut -d',' -f1)
          echo "Detected Alias: $ALIAS"
          echo "alias=$ALIAS" >> $GITHUB_OUTPUT
          rm debug.keystore

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ steps.detect_alias.outputs.alias }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}
