name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build Web Project
        run: pnpm build

      - name: Ensure Web Directory Exists
        run: |
          mkdir -p public
          if [ ! -f public/index.html ]; then
            echo "<html><body><h1>Placeholder</h1></body></html>" > public/index.html
          fi

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Verify iOS Compilation
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
                     -scheme App \
                     -configuration Debug \
                     -sdk iphonesimulator \
                     CODE_SIGNING_ALLOWED=NO \
                     COMPILER_INDEX_STORE_ENABLE=NO | xcpretty
